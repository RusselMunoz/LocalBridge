<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LocalBridge Client</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, sans-serif;
      color: #eee;
    }
    #status {
      margin-bottom: 12px;
      font-size: 13px;
      letter-spacing: .5px;
      opacity: .8;
    }
    #screen {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16/9;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      cursor: none;
      display: block;
    }
    #connect-btn {
      margin-top: 16px;
      padding: 10px 28px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }
    #connect-btn:hover { background: #1d4ed8; }
    #connect-btn:disabled { background: #444; cursor: default; }
  </style>
</head>
<body>
  <div id="status">Not connected</div>
  <video id="screen" autoplay playsinline muted></video>
  <button id="connect-btn">Connect</button>

<script>
'use strict';

const video = document.getElementById('screen');
const statusEl = document.getElementById('status');
const btn = document.getElementById('connect-btn');
const HOST = window.location.origin;

let pc = null;
let dc = null;

btn.addEventListener('click', connect);

video.addEventListener('loadedmetadata', async () => {
  try { await video.play(); } catch (_) {}
});

async function connect() {
  btn.disabled = true;
  setStatus('Connecting...');

  pc = new RTCPeerConnection({ iceServers: [] });

  pc.ontrack = e => {
    if (e.track.kind !== 'video') return;

    const stream = (e.streams && e.streams[0]) ? e.streams[0] : new MediaStream([e.track]);
    video.srcObject = stream;
    setStatus('Video track received');

    e.track.onunmute = async () => {
      try { await video.play(); } catch (_) {}
      setStatus('Connected');
    };

    e.track.onended = () => setStatus('Video track ended');
  };

  pc.oniceconnectionstatechange = () => {
    if (['disconnected', 'failed', 'closed'].includes(pc.iceConnectionState)) {
      setStatus('Disconnected - refresh to reconnect');
      btn.disabled = false;
    }
  };

  dc = pc.createDataChannel('input', { ordered: false, maxRetransmits: 0 });

  const videoTransceiver = pc.addTransceiver('video', { direction: 'recvonly' });
  preferH264(videoTransceiver);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIceReady(pc, 10000);

  const res = await fetch(`${HOST}/offer`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sdp: pc.localDescription?.sdp ?? offer.sdp,
      type: pc.localDescription?.type ?? offer.type,
    }),
  });

  const answer = await res.json();
  if (answer.error) {
    setStatus('Error: ' + answer.error);
    btn.disabled = false;
    return;
  }

  await pc.setRemoteDescription(new RTCSessionDescription(answer));
  setStatus('Waiting for stream...');
}

function preferH264(transceiver) {
  try {
    const caps = RTCRtpReceiver.getCapabilities && RTCRtpReceiver.getCapabilities('video');
    if (!caps || !Array.isArray(caps.codecs)) return;

    const h264 = caps.codecs.filter(c =>
      (c.mimeType || '').toLowerCase() === 'video/h264' &&
      (c.sdpFmtpLine || '').includes('packetization-mode=1')
    );

    if (h264.length > 0) {
      transceiver.setCodecPreferences(h264);
    }
  } catch (_) {
    // Best-effort only.
  }
}

function sdpHasCandidate(sdp) {
  return /(^|\r?\n)a=candidate:/m.test(sdp || '');
}

function waitForIceReady(pc, timeoutMs = 10000) {
  if (sdpHasCandidate(pc.localDescription && pc.localDescription.sdp)) {
    return Promise.resolve();
  }
  if (pc.iceGatheringState === 'complete') return Promise.resolve();

  return new Promise(resolve => {
    const done = () => {
      pc.removeEventListener('icegatheringstatechange', onState);
      pc.removeEventListener('icecandidate', onCandidate);
      clearTimeout(timer);
      resolve();
    };

    const onState = () => {
      if (pc.iceGatheringState === 'complete') {
        done();
      }
    };

    const onCandidate = e => {
      if (e.candidate || sdpHasCandidate(pc.localDescription && pc.localDescription.sdp)) {
        done();
      }
    };

    const timer = setTimeout(done, timeoutMs);
    pc.addEventListener('icegatheringstatechange', onState);
    pc.addEventListener('icecandidate', onCandidate);
  });
}

function send(obj) {
  if (dc && dc.readyState === 'open') {
    dc.send(JSON.stringify(obj));
  }
}

function rel(e) {
  const r = video.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width,
    y: (e.clientY - r.top) / r.height,
  };
}

video.addEventListener('mousemove', e => {
  const { x, y } = rel(e);
  send({ type: 'mouse_move', x, y });
});

video.addEventListener('mousedown', e => {
  const { x, y } = rel(e);
  send({ type: 'mouse_down', x, y, button: e.button });
});

video.addEventListener('mouseup', e => {
  const { x, y } = rel(e);
  send({ type: 'mouse_up', x, y, button: e.button });
});

video.addEventListener('wheel', e => {
  send({ type: 'mouse_scroll', dx: e.deltaX, dy: e.deltaY });
}, { passive: true });

document.addEventListener('keydown', e => {
  send({ type: 'key_down', code: e.code });
});

document.addEventListener('keyup', e => {
  send({ type: 'key_up', code: e.code });
});

video.addEventListener('contextmenu', e => e.preventDefault());

function setStatus(msg) {
  statusEl.textContent = msg;
}
</script>
</body>
</html>
